<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Portfolio</title>
  <meta name="description" content="A personal portfolio website with theme and language switching." />
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===== Navbar ===== -->
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="#home" class="logo" id="logo">Portfolio</a>

      <nav class="nav-links" id="navLinks">
        <a href="#home" data-i18n="nav.home">首页</a>
        <a href="#skills" data-i18n="nav.skills">技能</a>
        <a href="#experience" data-i18n="nav.experience">经历</a>
        <a href="#certificates" data-i18n="nav.certificates">证书荣誉</a>
        <a href="#projects" data-i18n="nav.projects">项目</a>
        <a href="#contact" data-i18n="nav.contact">联系</a>
      </nav>

      <div class="nav-controls">
        <button class="icon-btn" id="langBtn" title="切换语言 / Switch language" aria-label="切换语言">
          <span id="langLabel">中</span>
        </button>
        <button class="icon-btn" id="themeBtn" title="切换主题 / Toggle theme" aria-label="切换主题">
          <i class="fa-solid fa-moon" id="themeIcon"></i>
        </button>
        <button class="icon-btn menu-btn" id="menuBtn" aria-label="菜单">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- ===== Hero ===== -->
    <section class="hero" id="home">
      <div class="container hero-inner">
        <div class="hero-text">
          <p class="hero-greeting" id="heroGreeting">你好，我是</p>
          <h1 class="hero-name" id="heroName">Your Name</h1>
          <h2 class="hero-title" id="heroTitle">Your Title</h2>
          <p class="hero-tagline" id="heroTagline"></p>
          <p class="hero-intro" id="heroIntro"></p>
          <div class="hero-actions">
            <a href="#" class="btn btn-primary" id="heroResume" target="_blank" rel="noopener">查看简历</a>
            <a href="#contact" class="btn btn-ghost" data-i18n="hero.ctaContact">联系我</a>
          </div>
          <div class="hero-socials" id="heroSocials"></div>
        </div>
        <div class="hero-avatar">
          <img src="assets/avatar.svg" alt="avatar" id="heroAvatar" />
        </div>
      </div>
      <a href="#skills" class="scroll-hint" id="scrollHint">
        <span data-i18n="hero.scrollHint">向下滚动了解更多</span>
        <i class="fa-solid fa-chevron-down"></i>
      </a>
    </section>

    <!-- ===== Skills ===== -->
    <section class="section" id="skills">
      <div class="container">
        <h2 class="section-title reveal" id="skillsTitle">专业技能</h2>
        <div class="skills-grid" id="skillsGrid"></div>
      </div>
    </section>

    <!-- ===== Experience ===== -->
    <section class="section" id="experience">
      <div class="container">
        <h2 class="section-title reveal" id="expTitle">个人经历</h2>
        <div class="tabs" id="expTabs">
          <button class="tab active" data-tab="work" data-i18n="experienceTabs.work">工作经历</button>
          <button class="tab" data-tab="education" data-i18n="experienceTabs.education">教育经历</button>
          <button class="tab" data-tab="achievements" data-i18n="experienceTabs.achievements">成就与社区</button>
        </div>
        <div class="tab-panels" id="expPanels"></div>
      </div>
    </section>

    <!-- ===== Certificates ===== -->
    <section class="section" id="certificates">
      <div class="container">
        <h2 class="section-title reveal" id="certTitle">证书与荣誉</h2>
        <div class="card-grid" id="certGrid"></div>
      </div>
    </section>

    <!-- ===== Projects ===== -->
    <section class="section" id="projects">
      <div class="container">
        <h2 class="section-title reveal" id="projTitle">精选项目</h2>
        <div class="projects-grid" id="projGrid"></div>
      </div>
    </section>

    <!-- ===== Contact ===== -->
    <section class="section contact" id="contact">
      <div class="container contact-inner">
        <h2 class="section-title reveal" id="contactTitle">联系我</h2>
        <p class="contact-sub" id="contactSub">欢迎通过以下方式与我取得联系。</p>
        <div class="contact-socials" id="contactSocials"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© <span id="year"></span> <span id="footerName">Your Name</span>. <span id="footerRights">版权所有</span>.</p>
    </div>
  </footer>

  <!-- Loading / error overlay -->
  <div class="status-overlay" id="statusOverlay" hidden>
    <div class="status-box" id="statusBox">Loading…</div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
